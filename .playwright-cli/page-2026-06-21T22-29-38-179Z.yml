        - heading "Overview" [level=4] [ref=e100]
        - generic [ref=e101]: A restored period home on a quiet Marylebone street, arranged for modern family living with generous entertaining space, calm bedrooms and a landscaped west-facing terrace.
      - generic [ref=e102]:
        - heading "Full details" [level=4] [ref=e103]
        - generic [ref=e104]:
          - paragraph [ref=e105]: Cavendish House sits behind cast-iron railings on a tree-lined address moments from the village shops, restaurants and transport links of Marylebone. The house has been finished with a measured hand, retaining original proportion while introducing modern lighting, fitted storage and warm natural materials throughout.
          - paragraph [ref=e106]: The raised ground floor opens into a double reception with tall sash windows and a working fireplace. To the rear, a full-width kitchen and dining room connects directly to the terrace, creating a natural space for day-to-day family life and informal entertaining.
          - paragraph [ref=e107]: The principal suite occupies the quieter upper floor and includes a dressing area and marble-lined shower room. Two further bedrooms, a family bathroom, guest cloakroom and practical utility storage complete the accommodation.
